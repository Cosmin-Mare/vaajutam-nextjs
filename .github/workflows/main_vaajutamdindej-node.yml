name: Build and deploy Node.js app to Azure Web App - VaAjutamDinDej-Node

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Next standalone + traced `node_modules` — do not deploy full repo: Azure Oryx/npm install on the
      # host replaces `node_modules` and breaks `.next` ↔ `next` pairing ("prepare is not a function").
      - name: Assemble standalone deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -a .next/standalone/. deploy/
          mkdir -p deploy/.next/static
          cp -a .next/static/. deploy/.next/static/
          cp -a public/. deploy/public/
          node <<'NODE'
          const fs = require("fs");
          const p = JSON.parse(fs.readFileSync("deploy/package.json", "utf8"));
          p.scripts = { start: "node server.js" };
          fs.writeFileSync("deploy/package.json", JSON.stringify(p, null, 2));
          NODE

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # If the error persists, set these on the Web App (Configuration → Application settings):
      # SCM_DO_BUILD_DURING_DEPLOYMENT=false  ENABLE_ORYX_BUILD=false
      # and align the stack Node version with 20.x (WEBSITE_NODE_DEFAULT_VERSION ~20 on Windows, or Linux stack).

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'VaAjutamDinDej-Node'
          slot-name: 'Production'
          package: .
          startup-command: 'node server.js'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D43F470CE47D452DB6AA5E1A4D3024B7 }}